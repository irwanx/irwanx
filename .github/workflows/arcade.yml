name: Generate arcade animation

on:
  push:
    branches:
      - master
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: generate pacman-contribution-graph.svg
        uses: abozanona/pacman-contribution-graph@b18a2286e9e4f0a99723ec5f3ec3df43a0e6378c
        with:
          github_user_name: ${{ github.repository_owner }}
          games: 'bomberman'

      - name: push bomberman-contribution-graph.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: pacman-output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
